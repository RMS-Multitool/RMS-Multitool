<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Configure Import Groups — RMS Multitool</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a22; --surface: #22222e; --surface2: #2a2a38;
      --border: #3a3a4a; --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.12);
      --accent-glow: rgba(0,229,160,0.25); --text: #ffffff; --text-muted: #9b9bb5;
      --error: #ff4d6a; --error-dim: rgba(255,77,106,0.15);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex; flex-direction: column;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 32px 32px; opacity: 0.15; pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    .gc-header {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .gc-header-left h1 {
      font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
      color: var(--text); letter-spacing: -0.3px;
    }
    .gc-header-left p { font-size: 10px; color: var(--text-muted); margin-top: 3px; letter-spacing: 0.5px; }
    .gc-header-right { display: flex; align-items: center; gap: 10px; }

    /* ── Toolbar ── */
    .gc-toolbar {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 28px; border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0; flex-wrap: wrap;
    }
    .gc-search {
      flex: 1; min-width: 160px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 13px; font-family: 'DM Mono', monospace;
      font-size: 12px; color: var(--text); outline: none; transition: all 0.2s;
    }
    .gc-search::placeholder { color: var(--text-muted); }
    .gc-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .gc-status { font-size: 11px; color: var(--text-muted); }
    .gc-status.ok { color: var(--accent); }
    .gc-status.err { color: var(--error); }

    /* ── Body ── */
    .gc-body {
      position: relative; z-index: 1;
      flex: 1; overflow-y: auto; padding: 20px 28px;
    }
    .gc-body::-webkit-scrollbar { width: 5px; }
    .gc-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Group grid ── */
    .gc-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    /* Master heading divider */
    .gc-master-heading {
      display: flex; align-items: center; gap: 12px;
      padding: 22px 0 8px; color: var(--text); font-size: 13px;
      font-family: 'Syne', sans-serif; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .gc-master-heading::before { content: ''; flex: 0 0 3px; height: 18px; background: var(--accent); border-radius: 2px; }
    .gc-master-heading::after  { content: ''; flex: 1; height: 2px; background: linear-gradient(90deg, var(--border), transparent); }

    /* Sub-heading divider */
    .gc-section-heading {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 0 4px; color: var(--accent); font-size: 10px;
      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.85;
    }
    .gc-section-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .gc-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 13px; border-radius: 8px; cursor: pointer;
      border: 1px solid transparent; transition: all 0.15s; background: var(--surface);
    }
    .gc-row:hover { background: var(--surface2); border-color: var(--border); }
    .gc-row.is-heading { background: var(--accent-dim); border-color: rgba(0,229,160,0.2); }
    .gc-row.is-master { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08); }
    .gc-row.hidden-row { display: none; }

    /* checkbox */
    .gc-row input[type=checkbox] {
      appearance: none; width: 16px; height: 16px; flex-shrink: 0;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--bg); cursor: pointer; position: relative; transition: all 0.15s;
    }
    .gc-row input[type=checkbox]:checked { background: var(--accent); border-color: var(--accent); }
    .gc-row input[type=checkbox]:checked::after {
      content: ''; position: absolute; top: 2px; left: 5px;
      width: 4px; height: 8px; border: 2px solid var(--bg);
      border-top: none; border-left: none; transform: rotate(45deg);
    }
    .gc-row.is-heading input[type=checkbox],
    .gc-row.is-master  input[type=checkbox] { opacity: 0.2; pointer-events: none; }

    .gc-row-name { font-size: 12px; color: var(--text); flex: 1; line-height: 1.3; }
    .gc-row.is-heading .gc-row-name { color: var(--accent); font-style: italic; }
    .gc-row.is-master  .gc-row-name { color: var(--text); font-weight: 700; font-family: 'Syne', sans-serif; }
    .gc-row-desc { font-size: 10px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }

    /* H and M toggle buttons */
    .btn-h, .btn-m {
      appearance: none; background: none; border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 8px; font-family: 'DM Mono', monospace;
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px; color: var(--text-muted);
      cursor: pointer; transition: all 0.18s; flex-shrink: 0; user-select: none;
    }
    .btn-h:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .btn-h.active { background: var(--accent); border-color: var(--accent); color: var(--bg); box-shadow: 0 0 8px var(--accent-glow); }
    .btn-h.active:hover { background: #00c98d; border-color: #00c98d; box-shadow: none; }
    .btn-m:hover { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.1); }
    .btn-m.active { background: #a78bfa; border-color: #a78bfa; color: var(--bg); box-shadow: 0 0 8px rgba(167,139,250,0.4); }
    .btn-m.active:hover { background: #9370f0; border-color: #9370f0; box-shadow: none; }

    .gc-empty { font-size: 13px; color: var(--text-muted); font-style: italic; padding: 40px 0; text-align: center; }

    /* ── Footer ── */
    .gc-footer {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 12px;
      padding: 16px 28px; border-top: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .gc-footer-info { flex: 1; font-size: 11px; color: var(--text-muted); }
    .gc-footer-info strong { color: var(--text); }

    .btn { padding: 10px 22px; border: none; border-radius: 8px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; transition: all 0.2s; }
    .btn-accent { background: var(--accent); color: var(--bg); }
    .btn-accent:hover { box-shadow: 0 0 16px var(--accent-glow); }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-import { background: none; border: 1px dashed var(--border); border-radius: 8px; color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; padding: 10px 22px; cursor: pointer; transition: all 0.2s; }
    .btn-import:hover { border-color: var(--accent); color: var(--accent); border-style: solid; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 18px; font-size: 12px; color: var(--text); opacity: 0;
      transition: all 0.25s; pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

  <div class="gc-header">
    <div class="gc-header-left">
      <h1>📦 Configure Import Groups</h1>
      <p>Tick groups to show in the import picker &nbsp;·&nbsp; M = master heading &nbsp;·&nbsp; H = sub-heading</p>
    </div>
    <div class="gc-header-right">
      <button class="btn btn-ghost" id="selectAllBtn">Select All</button>
      <button class="btn btn-ghost" id="deselectAllBtn">Deselect All</button>
    </div>
  </div>

  <div class="gc-toolbar">
    <input class="gc-search" id="searchInput" type="text" placeholder="Filter groups…" autocomplete="off" spellcheck="false">
    <span class="gc-status" id="gcStatus"></span>
  </div>

  <div class="gc-body">
    <div class="gc-grid" id="gcGrid">
      <div class="gc-empty">Loading…</div>
    </div>
  </div>

  <div class="gc-footer">
    <div class="gc-footer-info" id="footerInfo"></div>
    <button class="btn-import" id="importConfigBtn">⬆ Import Config</button>
    <button class="btn btn-ghost" id="exportConfigBtn">⬇ Export Config</button>
    <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
    <button class="btn btn-accent" id="saveBtn">Save Config</button>
  </div>

  <input type="file" id="importFileInput" accept=".json" style="display:none;">
  <div class="toast" id="toast"></div>

  <script src="group-config.js"></script>
</body>
</html>
