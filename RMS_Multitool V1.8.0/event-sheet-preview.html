<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Sheet Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #2a2a38;
      min-height: 100vh;
    }

    /* ── Toolbar ── */
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: #1a1a22;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      font-size: 13px;
    }
    #tb-title {
      flex: 1; font-weight: 700; font-size: 14px; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #toolbar button {
      cursor: pointer; border: none; border-radius: 6px;
      padding: 8px 18px; font-size: 13px; font-weight: 600;
      font-family: inherit; white-space: nowrap;
      transition: opacity 0.15s;
    }
    #toolbar button:hover { opacity: 0.85; }
    #toolbar button:disabled { opacity: 0.5; cursor: default; }
    #btn-pdf   { background: #00a868; color: #fff; }
    #btn-print { background: #5b5bd6; color: #fff; }
    #btn-close { background: #2a2a38; color: #aaaacc; }
    #tb-toast  { font-size: 12px; color: #aaaacc; margin-left: 4px; }

    /* ── Scroll area ── */
    #scroll-area {
      margin-top: 56px;
      padding: 32px 24px 48px;
      overflow-y: auto;
    }

    /* ── Pages ── */
    .preview-page {
      width: 794px;         /* A4 at 96 dpi */
      min-height: 1123px;   /* A4 at 96 dpi */
      background: #fff;
      margin: 0 auto 28px;
      padding: 83px 68px;   /* 22mm top/bottom, 18mm left/right at 96 dpi */
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      position: relative;
    }
    .preview-page + .preview-page::before {
      /* subtle page-number label */
      content: '';
    }

    /* ── Measurement sandbox (hidden) ── */
    #measure-sandbox {
      position: absolute; top: -9999px; left: 0;
      width: 658px; /* A4 content width: 794 - 68*2 */
      visibility: hidden; pointer-events: none;
    }

    /* ── Loading state ── */
    #loading {
      color: #aaaacc; text-align: center;
      padding: 80px 0; font-size: 14px;
    }

    /* ── Print overrides ── */
    @media print {
      body { background: none; }
      #toolbar { display: none !important; }
      #scroll-area { margin-top: 0; padding: 0; }
      .preview-page {
        width: auto; min-height: 0;
        box-shadow: none; margin: 0; padding: 0;
        page-break-after: always;
        overflow: visible;
      }
      .preview-page:last-child { page-break-after: avoid; }
      #measure-sandbox { display: none; }
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <span id="tb-title">Event Sheet</span>
    <button id="btn-pdf">📥 Download PDF</button>
    <button id="btn-print">🖨 Print</button>
    <button id="btn-close">✕ Close</button>
    <span id="tb-toast"></span>
  </div>

  <div id="scroll-area">
    <div id="loading">Loading preview…</div>
  </div>

  <!-- Hidden sandbox for height measurement -->
  <div id="measure-sandbox"></div>

  <script src="event-sheet-preview.js"></script>
</body>
</html>
